<title>Servicos - Equipe Cabeleila</title>
<link rel="stylesheet" href="../assets/css/style.css" />

<header id="navbar" class="navbar"></header>

<main class="container">
  <h1>Servicos</h1>
  <p class="subtitle">Catalogo de servicos oferecidos pelo salao.</p>

  <div id="alert-box" class="alert hidden"></div>

  <div class="card">
    <h2 style="margin-top:0;" id="form-title">Novo servico</h2>
    <form id="service-form">
      <input type="hidden" id="service-id" value="" />
      <div class="form-group">
        <label for="service-name">Nome</label>
        <input type="text" id="service-name" required />
      </div>
      <div class="form-group">
        <label for="service-description">Descricao</label>
        <textarea id="service-description" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label for="service-duration">Duracao (minutos)</label>
        <input type="number" id="service-duration" min="1" required />
      </div>
      <div class="form-group">
        <label for="service-price">Preco (R$)</label>
        <input type="number" id="service-price" min="0" step="0.01" required />
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-primary" id="save-btn">Salvar</button>
        <button type="button" class="btn-secondary hidden" id="cancel-edit-btn">Cancelar edicao</button>
      </div>
    </form>
  </div>

  <div class="card">
    <h2 style="margin-top:0;">Servicos ativos</h2>
    <div id="service-list"><p class="text-muted">Carregando...</p></div>
  </div>
</main>

<script type="module" src="../assets/js/controllers/StaffServicosController.js"></script>
